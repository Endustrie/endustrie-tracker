name: test-build-deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      # branch-based Pages deploy: more reliable than the deploy-pages API
      - name: Push dist to gh-pages
        run: |
          cd dist
          touch .nojekyll
          git init -q -b gh-pages
          git config user.name "endustrie-ci"
          git config user.email "ci@users.noreply.github.com"
          git add -A
          git commit -q -m "deploy ${GITHUB_SHA::9}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
